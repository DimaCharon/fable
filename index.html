<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#07080c" />
    <meta name="description" content="Fable — a dark fairytale social network" />
    <title>Fable · Enter the Realm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="login">
    <div class="bg-scene" aria-hidden="true"></div>

    <main class="login-wrap">
      <div class="login-card glass glass-strong">
        <div class="login-icon" aria-hidden="true">🗡️</div>
        <h1 class="logo">
          Fable
          <span>Dark Fairytale Social</span>
        </h1>
        <p class="tagline">No passwords. Choose a name — and step into the legend.</p>

        <form id="login-form" autocomplete="off">
          <div class="field">
            <label for="nickname">Enter your Nickname</label>
            <input
              id="nickname"
              name="nickname"
              type="text"
              maxlength="24"
              placeholder="e.g. NightWarden"
              autofocus
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Enter</button>
          <p class="error-msg" id="login-error" role="alert"></p>
        </form>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
